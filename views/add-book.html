<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить книгу - Трекер чтения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 28px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }
        
        .btn-back {
            background: #95a5a6;
            color: white;
        }
        
        .btn-back:hover {
            background: #7f8c8d;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        
        .form-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .error-message {
            background: #e74c3c;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-message {
            background: #27ae60;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Добавить книгу</h1>
            <a href="/" class="btn btn-back">← Назад</a>
        </div>
        
        <div class="form-card">
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="addBookForm">
                <div class="form-group">
                    <label for="title">Название книги *</label>
                    <input type="text" id="title" name="title" required placeholder="Введите название">
                </div>
                
                <div class="form-group">
                    <label for="author">Автор *</label>
                    <input type="text" id="author" name="author" required placeholder="Введите автора">
                </div>
                
                <div class="form-group">
                    <label for="total_pages">Количество страниц *</label>
                    <input type="number" id="total_pages" name="total_pages" required min="1" placeholder="Например: 350">
                </div>
                
                <div class="form-group">
                    <label for="start_date">Дата начала чтения</label>
                    <input type="date" id="start_date" name="start_date">
                    <div class="info-text">Необязательное поле</div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">✅ Добавить книгу</button>
                    <button type="button" onclick="resetForm()" class="btn btn-back">🔄 Очистить</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('addBookForm');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Скрываем старые сообщения
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            const title = document.getElementById('title').value.trim();
            const author = document.getElementById('author').value.trim();
            const total_pages = parseInt(document.getElementById('total_pages').value);
            const start_date = document.getElementById('start_date').value;
            
            // Валидация
            if (!title) {
                showError('Введите название книги');
                return;
            }
            
            if (!author) {
                showError('Введите автора книги');
                return;
            }
            
            if (!total_pages || total_pages < 1) {
                showError('Введите корректное количество страниц (минимум 1)');
                return;
            }
            
            try {
                const response = await fetch('/api/books', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title,
                        author,
                        total_pages,
                        start_date: start_date || null
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess('Книга успешно добавлена!');
                    resetForm();
                    // Перенаправление через 1.5 секунды
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showError(data.error || 'Ошибка при добавлении книги');
                }
            } catch (error) {
                showError('Ошибка соединения с сервером');
            }
        });
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
        
        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }
        
        function resetForm() {
            form.reset();
        }
    </script>
</body>
</html>
