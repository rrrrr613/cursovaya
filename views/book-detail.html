<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали книги - Трекер чтения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 28px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }
        
        .btn-back {
            background: #95a5a6;
            color: white;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-success {
            background: #27ae60;
            color: white;
        }
        
        .btn-warning {
            background: #f39c12;
            color: white;
        }
        
        .book-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .book-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .book-author {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
            font-style: italic;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .info-label {
            font-weight: 600;
            color: #555;
        }
        
        .info-value {
            color: #333;
        }
        
        .progress-section {
            margin: 20px 0;
        }
        
        .progress-bar-container {
            background: #e0e0e0;
            border-radius: 10px;
            height: 30px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .progress-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .rating {
            font-size: 24px;
            color: #f39c12;
            cursor: pointer;
        }
        
        .rating-star {
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .rating-star:hover {
            transform: scale(1.2);
        }
        
        .notes-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .note-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        
        .note-text {
            color: #333;
            margin-bottom: 5px;
        }
        
        .note-date {
            font-size: 12px;
            color: #999;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 10px;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .progress-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .progress-input input {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📖 Детали книги</h1>
            <a href="/" class="btn btn-back">← Назад</a>
        </div>
        
        <div id="bookContent">Загрузка...</div>
    </div>
    
    <script>
        const bookId = window.location.pathname.split('/').pop();
        
        async function loadBook() {
            try {
                const response = await fetch(`/api/books/${bookId}`);
                const book = await response.json();
                
                if (!response.ok) {
                    throw new Error(book.error);
                }
                
                const stars = '★'.repeat(book.rating) + '☆'.repeat(5 - book.rating);
                const statusText = {
                    'reading': 'Читаю',
                    'finished': 'Прочитано',
                    'planned': 'Запланировано'
                }[book.status] || book.status;
                
                const progress = (book.current_page / book.total_pages * 100).toFixed(1);
                
                document.getElementById('bookContent').innerHTML = `
                    <div class="book-card">
                        <div class="book-title">${escapeHtml(book.title)}</div>
                        <div class="book-author">${escapeHtml(book.author)}</div>
                        
                        <div class="info-row">
                            <span class="info-label">📄 Страницы:</span>
                            <span class="info-value">${book.current_page} / ${book.total_pages}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">📊 Прогресс:</span>
                            <span class="info-value">${progress}%</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">📌 Статус:</span>
                            <span class="info-value">${statusText}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">⭐ Рейтинг:</span>
                            <span class="rating" id="ratingStars">${stars}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">📅 Дата начала:</span>
                            <span class="info-value">${book.start_date || '—'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">✅ Дата завершения:</span>
                            <span class="info-value">${book.finish_date || '—'}</span>
                        </div>
                        
                        <div class="progress-section">
                            <h3>Обновить прогресс</h3>
                            <div class="progress-bar-container">
                                <div class="progress-bar" style="width: ${progress}%">${progress}%</div>
                            </div>
                            <div class="progress-input">
                                <input type="number" id="progressInput" min="0" max="${book.total_pages}" value="${book.current_page}" placeholder="Введите страницу">
                                <button onclick="updateProgress()" class="btn btn-primary">Обновить</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="notes-section">
                        <h3>📝 Заметки</h3>
                        <textarea id="noteText" rows="3" placeholder="Напишите заметку о книге..."></textarea>
                        <button onclick="addNote()" class="btn btn-success">➕ Добавить заметку</button>
                        
                        <div style="margin-top: 20px;" id="notesList">
                            ${book.notes && book.notes.length > 0 ? book.notes.map(note => `
                                <div class="note-item">
                                    <div class="note-text">${escapeHtml(note.note_text)}</div>
                                    <div class="note-date">${new Date(note.created_at).toLocaleString('ru-RU')}</div>
                                </div>
                            `).join('') : '<p style="color: #999;">Пока нет заметок</p>'}
                        </div>
                    </div>
                `;
                
                // Добавляем обработчики для рейтинга
                attachRatingHandlers(book.rating);
                
            } catch (error) {
                document.getElementById('bookContent').innerHTML = `
                    <div class="book-card">
                        <p style="color: red;">❌ Ошибка загрузки книги: ${error.message}</p>
                        <a href="/" class="btn btn-back">Вернуться назад</a>
                    </div>
                `;
            }
        }
        
        function attachRatingHandlers(currentRating) {
            const starsContainer = document.getElementById('ratingStars');
            if (!starsContainer) return;
            
            const stars = starsContainer.textContent;
            starsContainer.innerHTML = '';
            
            for (let i = 1; i <= 5; i++) {
                const star = document.createElement('span');
                star.textContent = i <= currentRating ? '★' : '☆';
                star.style.cursor = 'pointer';
                star.style.fontSize = '24px';
                star.style.margin = '0 2px';
                star.onclick = () => updateRating(i);
                starsContainer.appendChild(star);
            }
        }
        
        async function updateRating(rating) {
            try {
                const response = await fetch(`/api/books/${bookId}/rating`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rating })
                });
                
                if (response.ok) {
                    loadBook();
                } else {
                    alert('Ошибка при обновлении рейтинга');
                }
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }
        
        async function updateProgress() {
            const input = document.getElementById('progressInput');
            const current_page = parseInt(input.value);
            
            if (isNaN(current_page) || current_page < 0) {
                alert('Введите корректное количество страниц');
                return;
            }
            
            try {
                const response = await fetch(`/api/books/${bookId}/progress`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current_page })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    loadBook();
                } else {
                    alert(data.error || 'Ошибка при обновлении прогресса');
                }
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }
        
        async function addNote() {
            const noteText = document.getElementById('noteText').value.trim();
            
            if (!noteText) {
                alert('Введите текст заметки');
                return;
            }
            
            try {
                const response = await fetch(`/api/books/${bookId}/notes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note_text: noteText })
                });
                
                if (response.ok) {
                    document.getElementById('noteText').value = '';
                    loadBook();
                } else {
                    alert('Ошибка при добавлении заметки');
                }
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadBook();
    </script>
</body>
</html>
