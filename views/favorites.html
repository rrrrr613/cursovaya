<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Избранное - Читательский дневник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: #f0ebe4;
            min-height: 100vh;
        }

        /* Шапка */
        .header {
            background: #5c2e2e;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 20px;
            color: #f0e6d2;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .nav {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav a {
            color: #d4c5a9;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .nav a:hover {
            color: #f0e6d2;
        }

        .nav a.active {
            color: #f0e6d2;
            border-bottom: 1px solid #f0e6d2;
            padding-bottom: 4px;
        }

        .user-name {
            color: #f0e6d2;
            font-size: 14px;
            margin-left: 20px;
            padding-left: 20px;
            border-left: 1px solid #7a4a4a;
        }

        .logout-btn {
            background: #4a2424;
            padding: 6px 15px;
            border-radius: 20px;
            color: #f0e6d2 !important;
        }

        .logout-btn:hover {
            background: #3a1a1a;
        }

        /* Контейнер */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .page-title {
            font-size: 24px;
            color: #3d1e1e;
            font-weight: 400;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* Сетка карточек (вертикальные) */
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        /* Карточка книги (вертикальная) */
        .book-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: box-shadow 0.2s;
            position: relative;
        }

        .book-card:hover {
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
        }

        /* Фото книги */
        .book-cover {
            width: 100%;
            height: 280px;
            background: #e0d5cc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #8a7a6a;
            overflow: hidden;
        }

        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Информация о книге */
        .book-info {
            padding: 15px;
            position: relative;
        }

        .book-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .book-title {
            font-size: 16px;
            font-weight: 600;
            color: #3d1e1e;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .book-author {
            font-size: 13px;
            color: #8a7a6a;
            margin-top: 4px;
        }

        .edit-icon {
            color: #8a7a6a;
            cursor: pointer;
            font-size: 16px;
            padding: 5px;
            flex-shrink: 0;
        }

        .edit-icon:hover {
            color: #5c2e2e;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #8a7a6a;
            grid-column: 1 / -1;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0d5cc;
        }

        .modal-header h3 {
            color: #3d1e1e;
            font-weight: 500;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #8a7a6a;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #5c4a3a;
            margin-bottom: 5px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd0c0;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #5c2e2e;
        }

        .image-preview {
            width: 80px;
            height: 100px;
            background: #e0d5cc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            overflow: hidden;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .modal-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-read {
            background: #5c2e2e;
            color: white;
        }

        .btn-reading {
            background: #d4a54a;
            color: white;
        }

        .btn-favorite {
            background: #8a7a6a;
            color: white;
        }

        .btn-cancel {
            background: #e0d5cc;
            color: #5c4a3a;
        }

        .review-input {
            margin-top: 15px;
        }

        .review-input textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd0c0;
            border-radius: 8px;
            resize: vertical;
        }

        .btn-save {
            background: #5c2e2e;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .stars {
            display: flex;
            gap: 4px;
            margin: 8px 0;
        }

        .star {
            font-size: 18px;
            color: #ddd0c0;
            cursor: pointer;
        }

        .star.filled {
            color: #d4a54a;
        }

        @media (max-width: 768px) {
            .books-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 15px;
            }
            .book-cover {
                height: 200px;
            }
            .header {
                flex-direction: column;
                text-align: center;
            }
            .user-name {
                margin-left: 0;
                padding-left: 0;
                border-left: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Читательский дневник</div>
        <div class="nav">
            <a href="/">Главная</a>
            <a href="/favorites" class="active">Избранное</a>
            <span class="user-name" id="username">Загрузка...</span>
            <a href="/logout" class="logout-btn">Выйти</a>
        </div>
    </div>

    <div class="container">
        <h2 class="page-title">📌 Избранное</h2>
        <div id="booksContainer" class="books-grid">
            <div class="empty-state">Загрузка...</div>
        </div>
    </div>

    <!-- Модальное окно редактирования -->
    <div id="bookModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Редактировать книгу</h3>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <form id="bookForm">
                <input type="hidden" id="bookId" value="">
                <div class="form-group">
                    <label>Фото обложки</label>
                    <input type="file" id="bookImage" accept="image/*">
                    <div class="image-preview" id="imagePreview">
                        <span>📷</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Название книги *</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label>Автор *</label>
                    <input type="text" id="author" required>
                </div>
                <div class="form-group">
                    <label>Количество страниц</label>
                    <input type="number" id="totalPages" min="1">
                </div>
                <div class="form-group">
                    <label>Оценка (звёзды)</label>
                    <div class="stars" id="ratingStars">
                        <span class="star" data-rating="1">☆</span>
                        <span class="star" data-rating="2">☆</span>
                        <span class="star" data-rating="3">☆</span>
                        <span class="star" data-rating="4">☆</span>
                        <span class="star" data-rating="5">☆</span>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="modal-btn btn-read" onclick="setStatus('finished')">Прочитал/а</button>
                    <button type="button" class="modal-btn btn-reading" onclick="setStatus('reading')">Читаю</button>
                    <button type="button" class="modal-btn btn-favorite" onclick="setStatus('favorite')">Избранное</button>
                    <button type="button" class="modal-btn btn-cancel" onclick="closeModal()">Отмена</button>
                </div>
                <div class="review-input">
                    <label>Отзыв</label>
                    <textarea id="review" rows="3" placeholder="Напишите ваш отзыв о книге..."></textarea>
                </div>
                <button type="submit" class="btn-save">Сохранить</button>
            </form>
        </div>
    </div>

    <script>
        let currentRating = 0;
        let booksData = [];

        async function loadUser() {
            try {
                const response = await fetch('/api/me');
                const data = await response.json();
                if (data.authenticated) {
                    document.getElementById('username').innerHTML = `👤 ${data.username}`;
                } else {
                    window.location.href = '/login';
                }
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }

        async function loadBooks() {
            try {
                const response = await fetch('/api/books');
                booksData = await response.json();
                renderBooks();
            } catch (error) {
                document.getElementById('booksContainer').innerHTML = '<div class="empty-state">Ошибка загрузки</div>';
            }
        }

        function renderBooks() {
            const favoriteBooks = booksData.filter(b => b.status === 'favorite');
            const container = document.getElementById('booksContainer');
            
            if (favoriteBooks.length === 0) {
                container.innerHTML = `<div class="empty-state">📖 В избранном пока нет книг</div>`;
                return;
            }

            container.innerHTML = favoriteBooks.map(book => `
                <div class="book-card">
                    <div class="book-cover">
                        ${book.image ? `<img src="${book.image}" alt="обложка">` : '📖'}
                    </div>
                    <div class="book-info">
                        <div class="book-header">
                            <div>
                                <div class="book-title">${escapeHtml(book.title)}</div>
                                <div class="book-author">${escapeHtml(book.author)}</div>
                            </div>
                            <div class="edit-icon" onclick="editBook(${book.id})">✏️</div>
                        </div>
                        <div class="stars">
                            ${renderStars(book.rating || 0)}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                stars += `<span class="star ${i <= rating ? 'filled' : ''}">★</span>`;
            }
            return stars;
        }

        function setupRatingStars() {
            const stars = document.querySelectorAll('#ratingStars .star');
            stars.forEach(star => {
                star.onclick = () => {
                    const rating = parseInt(star.dataset.rating);
                    currentRating = rating;
                    stars.forEach((s, i) => {
                        if (i < rating) {
                            s.textContent = '★';
                            s.classList.add('filled');
                        } else {
                            s.textContent = '☆';
                            s.classList.remove('filled');
                        }
                    });
                };
            });
        }

        function setStatus(status) {
            document.getElementById('statusHidden').value = status;
        }

        function editBook(id) {
            const book = booksData.find(b => b.id === id);
            if (book) {
                document.getElementById('modalTitle').innerText = 'Редактировать книгу';
                document.getElementById('bookId').value = book.id;
                document.getElementById('title').value = book.title;
                document.getElementById('author').value = book.author;
                document.getElementById('totalPages').value = book.total_pages || '';
                document.getElementById('review').value = book.review || '';
                currentRating = book.rating || 0;
                
                const stars = document.querySelectorAll('#ratingStars .star');
                stars.forEach((star, i) => {
                    if (i < currentRating) {
                        star.textContent = '★';
                        star.classList.add('filled');
                    } else {
                        star.textContent = '☆';
                        star.classList.remove('filled');
                    }
                });
                
                document.getElementById('bookModal').classList.add('active');
            }
        }

        function closeModal() {
            document.getElementById('bookModal').classList.remove('active');
            document.getElementById('bookForm').reset();
            document.getElementById('bookId').value = '';
            currentRating = 0;
        }

        document.getElementById('bookForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('bookId').value;
            const bookData = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                total_pages: parseInt(document.getElementById('totalPages').value) || 0,
                rating: currentRating,
                review: document.getElementById('review').value,
                status: document.getElementById('statusHidden')?.value || 'favorite'
            };
            
            try {
                const response = await fetch(`/api/books/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookData)
                });
                
                if (response.ok) {
                    closeModal();
                    loadBooks();
                } else {
                    const error = await response.json();
                    alert(error.error || 'Ошибка сохранения');
                }
            } catch (error) {
                alert('Ошибка соединения');
            }
        });

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Инициализация
        loadUser();
        loadBooks();
        setupRatingStars();
        
        const hiddenStatus = document.createElement('input');
        hiddenStatus.type = 'hidden';
        hiddenStatus.id = 'statusHidden';
        document.getElementById('bookForm').appendChild(hiddenStatus);
    </script>
</body>
</html>
